name: Build & Release APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build APK and create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      CI: true
      EXPO_NO_TELEMETRY: 1
      NODE_OPTIONS: --max_old_space_size=4096
      GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Prebuild Android project
        run: npx expo prebuild --platform android --clean --no-install

      - name: Remove removed Android Gradle options
        run: |
          sed -i '/android.useNewApkCreator/d' android/gradle.properties || true

      - name: Patch Gradle repository URL syntax
        run: |
          python3 - <<'PATCH'
          from pathlib import Path
          import re

          build_gradle = Path('android/build.gradle')
          text = build_gradle.read_text()

          text = re.sub(r'(?<![A-Za-z0-9_])url\s*\(', 'url = uri(', text)
          text = re.sub(r'(?<![A-Za-z0-9_])url\s+("[^"]+"|\'[^\']+\'')', r'url = uri(\1)', text)

          build_gradle.write_text(text)
          PATCH

      - name: Generate debug keystore for release signing
        run: |
          mkdir -p android/app
          rm -f android/app/debug.keystore
          keytool -genkeypair \
            -v \
            -storetype JKS \
            -keystore android/app/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Ensure Gradle settings
        run: |
          chmod +x android/gradlew
          {
            echo "org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8"
            echo "android.useAndroidX=true"
            echo "android.enablePngCrunchInReleaseBuilds=true"
          } >> android/gradle.properties

      - name: Build signed release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace --warning-mode all

      - name: Collect APK artifact
        run: |
          mkdir -p artifacts
          APK_PATH=$(find android/app/build/outputs/apk/release -type f -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "Release APK was not found"
            exit 1
          fi
          cp "$APK_PATH" artifacts/sober-path-v${GITHUB_REF_NAME#v}.apk
          ls -lh artifacts/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sober-path-release-apk
          path: artifacts/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "Sober Path ${{ github.ref_name }}"
          body: |
            ## 🌿 Sober Path ${{ github.ref_name }}

            ### Что нового
            - Объединены базовые и расширенные упражнения в единый раздел с подразделами
            - Интерактивные упражнения с таймерами, анимацией дыхания и обратной связью
            - Обновлена документация (README)
            - Исправлены ошибки и опечатки

            ### Установка
            Скачайте APK-файл из артефактов ниже и установите на устройство Android.

            ### Поддержка
            - GitHub: [mx57/Sober-Path](https://github.com/mx57/Sober-Path)
            - Issues: [Открыть задачу](https://github.com/mx57/Sober-Path/issues)
          files: artifacts/*.apk
          draft: false
          prerelease: false
