name: "Auto Release on PR Merge"

on:
  push:
    branches: [main, master]
  pull_request:
    types: [closed]
    branches: [main, master]

permissions:
  contents: write
  packages: write

env:
  CI: true
  EXPO_NO_TELEMETRY: 1
  NODE_OPTIONS: "--max_old_space_size=4096"
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8"

jobs:
  # ---------------------------------------------------------------
  # Gate: skip if PR was closed without merge
  # ---------------------------------------------------------------
  check-merge:
    name: Check if PR was merged
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    steps:
      - name: Confirm merge
        run: |
          echo "Trigger event: ${{ github.event_name }}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "PR #${{ github.event.pull_request.number }} was merged"
          else
            echo "Push to ${{ github.ref_name }} - checking for release"
          fi

  # ---------------------------------------------------------------
  # Extract version from app.json and prepare release body
  # ---------------------------------------------------------------
  prepare-release:
    name: Prepare release metadata
    needs: check-merge
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      body: ${{ steps.meta.outputs.body }}
      is_new_version: ${{ steps.meta.outputs.is_new_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version and prepare metadata
        id: meta
        run: |
          # Read version from app.json
          VERSION=$(node -p "require('./app.json').expo.version")
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

          # Check if this tag already exists
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "is_new_version=false" >> "$GITHUB_OUTPUT"
          else
            echo "is_new_version=true" >> "$GITHUB_OUTPUT"
          fi

          MERGE_COMMIT="${{ github.sha }}"
          SHORT_SHA=$(echo "$MERGE_COMMIT" | cut -c1-7)
          COMMIT_MSG=$(git log -1 --pretty=format:"%s" "$MERGE_COMMIT")

          # Build release body using a heredoc to avoid shell quoting issues
          cat > /tmp/release_body.md << END_OF_BODY
          ## Sober Path ${TAG}

          ### Changes

          **${COMMIT_MSG}**

          Commit: \`${SHORT_SHA}\`

          ---

          ### Included in this release

          | Architecture | Description | For whom |
          |:---:|:---|:---|
          | \`universal\` | Universal APK (all architectures) | **Recommended** - works on most devices |
          | \`arm64-v8a\` | ARM 64-bit | Modern phones (2019+) |
          | \`armeabi-v7a\` | ARM 32-bit | Old and budget devices |
          | \`x86_64\` | x86 64-bit | Emulators and Chromebook |

          **Tip:** If unsure, download \`universal\` - it works on all devices.

          ### System requirements
          - Android 7.0 (API 24) or higher
          - ~50 MB free space
          - Recommended 2+ GB RAM

          ### Links
          - Source code: https://github.com/mx57/Sober-Path
          - Report a bug: https://github.com/mx57/Sober-Path/issues
          - Suggest improvement: https://github.com/mx57/Sober-Path/issues/new?template=feature_request.md

          ---
          Auto-generated release for version ${VERSION}
          END_OF_BODY

          # Store as multiline output
          {
            echo "body<<EOF_MARKER"
            cat /tmp/release_body.md
            echo "EOF_MARKER"
          } >> "$GITHUB_OUTPUT"

          echo "Version: ${VERSION}"
          echo "Tag: ${TAG}"

  # ---------------------------------------------------------------
  # Build APK for each architecture in parallel
  # ---------------------------------------------------------------
  build-apk:
    name: "Build APK (${{ matrix.abi }})"
    needs: prepare-release
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: universal
            ndk_filter: ""
            artifact_suffix: universal
          - abi: arm64-v8a
            ndk_filter: arm64-v8a
            artifact_suffix: arm64
          - abi: armeabi-v7a
            ndk_filter: armeabi-v7a
            artifact_suffix: arm32
          - abi: x86_64
            ndk_filter: x86_64
            artifact_suffix: x86_64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Prebuild Android project
        run: npx expo prebuild --platform android --clean --no-install

      - name: Remove deprecated Gradle options
        run: sed -i '/android.useNewApkCreator/d' android/gradle.properties || true

      - name: Patch Gradle repository URL syntax
        run: sed -i 's/url(/url = uri(/g' android/build.gradle && echo "Patched build.gradle"

      - name: Generate debug keystore for release signing
        run: |
          mkdir -p android/app
          rm -f android/app/debug.keystore
          keytool -genkeypair \
            -v \
            -storetype JKS \
            -keystore android/app/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Inject ABI filter into build.gradle
        if: matrix.ndk_filter != ''
        run: |
          python3 << 'PYEOF'
          import re, sys

          path = "android/app/build.gradle"
          abi = "${{ matrix.ndk_filter }}"

          with open(path, "r") as f:
              content = f.read()

          # Find the defaultConfig block and inject ndk { abiFilters inside it
          # Strategy: find "defaultConfig {" and then find the matching closing brace,
          # then insert ndk { abiFilters "..."; } before the closing brace

          # Match defaultConfig { ... } — handles nested braces
          pattern = r'(defaultConfig\s*\{)'
          match = re.search(pattern, content)
          if not match:
              print("WARNING: defaultConfig block not found, ABI filter not applied")
              sys.exit(0)

          start = match.end()
          # Count braces to find the closing } of defaultConfig
          depth = 1
          pos = start
          while pos < len(content) and depth > 0:
              if content[pos] == '{':
                  depth += 1
              elif content[pos] == '}':
                  depth -= 1
              pos += 1

          # pos is now right after the closing } of defaultConfig
          closing_brace_pos = pos - 1

          # Check if ndk block already exists
          default_config_text = content[match.start():pos]
          if 'ndk' in default_config_text and 'abiFilters' in default_config_text:
              print("ABI filter already present, skipping injection")
              sys.exit(0)

          ndk_block = f"\n            ndk {{\n                abiFilters \"{abi}\"\n            }}\n"
          content = content[:closing_brace_pos] + ndk_block + "        " + content[closing_brace_pos:]

          with open(path, "w") as f:
              f.write(content)

          print(f"Injected ABI filter: {abi}")
          PYEOF

      - name: Ensure Gradle settings
        run: |
          chmod +x android/gradlew
          {
            echo "org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8"
            echo "android.useAndroidX=true"
            echo "android.enablePngCrunchInReleaseBuilds=true"
          } >> android/gradle.properties

      - name: Build signed release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace --warning-mode all

      - name: Collect and rename APK
        run: |
          mkdir -p artifacts
          VERSION="${{ needs.prepare-release.outputs.version }}"
          APK_PATH=$(find android/app/build/outputs/apk/release -type f -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "Release APK not found for ABI: ${{ matrix.abi }}"
            exit 1
          fi
          DEST="artifacts/Sober-Path-v${VERSION}-${{ matrix.artifact_suffix }}.apk"
          cp "$APK_PATH" "$DEST"
          echo "Built: $DEST"
          ls -lh "$DEST"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ matrix.artifact_suffix }}
          path: artifacts/*.apk
          if-no-files-found: error
          retention-days: 30

  # ---------------------------------------------------------------
  # Create GitHub Release with all APKs
  # ---------------------------------------------------------------
  create-release:
    name: Create GitHub Release
    needs: [prepare-release, build-apk]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all APK artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: apk-*
          merge-multiple: true

      - name: List release artifacts
        run: ls -lh artifacts/

      - name: Delete existing release if tag exists
        if: needs.prepare-release.outputs.is_new_version == 'false'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete "${{ needs.prepare-release.outputs.tag }}" --yes --cleanup-tag || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Sober Path ${{ needs.prepare-release.outputs.tag }}"
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          body: ${{ needs.prepare-release.outputs.body }}
          files: artifacts/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
