name: Android Release APKs

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  build-release-apks:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max_old_space_size=4096
      ORG_GRADLE_PROJECT_android_enablePngCrunchInReleaseBuilds: true
      ORG_GRADLE_PROJECT_android_useNewApkCreator: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest

      - name: Export assets
        run: npx expo export --platform android

      - name: Prebuild Android (Expo)
        run: npx expo prebuild -p android --no-install

      - name: Patch android build to disable splits & add packaging options
        run: |
          mkdir -p android
          echo "org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m" >> android/gradle.properties
          echo "android.useNewApkCreator=false" >> android/gradle.properties

      - name: Ensure gradlew is executable
        run: chmod +x android/gradlew

      - name: Generate release keystore
        run: |
          mkdir -p android/app
          keytool -genkeypair -v -storetype JKS -keystore android/app/release.keystore -alias release -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=SoberPath, OU=Development, O=SoberPath, L=Moscow, ST=Moscow, C=RU"

      - name: Build Release APKs
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace --warning-mode all

      - name: Collect APKs
        run: |
          mkdir -p $GITHUB_WORKSPACE/artifacts
          find android/app/build/outputs/apk/release -type f -name "*.apk" -print -exec cp {} $GITHUB_WORKSPACE/artifacts/ \;

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: artifacts/*.apk
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
