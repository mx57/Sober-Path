name: Android Release APKs

on:
  push:
    tags:
      - '*'
  workflow_dispatch: {}

jobs:
  build-release-apks:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max_old_space_size=4096
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Export assets
        run: npx expo export --platform android

      - name: Install JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Prebuild Android (Expo)
        run: npx expo prebuild -p android --no-install

      - name: Patch android build to disable splits & add packaging options
        run: |
          if [ -f android/app/build.gradle ]; then
            python3 - <<'PY'
import re,sys
p='android/app/build.gradle'
s=open(p,'r',encoding='utf-8').read()
# Find the first occurrence of the android { block and insert packaging/splits config right after it
m=re.search(r'android\s*\{',s)
if not m:
    print('android block not found, skipping patch')
    sys.exit(0)
idx=m.end()
insert='''
    // CI patch: disable APK splits that can trigger IncrementalSplitter failures and exclude common duplicate META-INF files
    splits {
        abi {
            enable false
        }
        density {
            enable false
        }
    }
    packagingOptions {
        resources {
            excludes += ["META-INF/DEPENDENCIES", "META-INF/LICENSE", "META-INF/LICENSE.txt", "META-INF/NOTICE"]
        }
        jniLibs {
            useLegacyPackaging = true
        }
    }
'''
# Avoid double-patching
if 'CI patch: disable APK splits' in s:
    print('already patched')
    sys.exit(0)
ns = s[:idx] + insert + s[idx:]
open(p,'w',encoding='utf-8').write(ns)
print('patched',p)
PY
          else
            echo "No android/app/build.gradle to patch"
          fi

      - name: Ensure android/gradlew is executable
        run: |
          if [ -f android/gradlew ]; then chmod +x android/gradlew; fi

      - name: Generate test keystore
        run: |
          mkdir -p android/app
          keytool -genkeypair -v -storetype JKS -keystore android/app/release.keystore -alias release -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=example"

      - name: Build release APK(s)
        working-directory: android
        run: ./gradlew clean assembleRelease --no-daemon --stacktrace --info --warning-mode all

      - name: Find and Sign APKs
        run: |
          mkdir -p $GITHUB_WORKSPACE/artifacts
          find android/app/build/outputs/apk/release -type f -name "*.apk" -print -exec cp {} $GITHUB_WORKSPACE/artifacts/ \;
          ls -la $GITHUB_WORKSPACE/artifacts || true

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: artifacts/

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: artifacts/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
