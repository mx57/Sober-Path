name: Android Release APKs

on:
  push:
    tags:
      - '*'
  workflow_dispatch: {}

jobs:
  build-release-apks:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max_old_space_size=4096
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Export assets
        run: npx expo export --platform android

      - name: Install JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Prebuild Android (Expo)
        run: npx expo prebuild -p android --no-install

      - name: Ensure android/gradlew is executable
        run: |
          if [ -f android/gradlew ]; then chmod +x android/gradlew; fi

      - name: Generate test keystore
        run: |
          mkdir -p android/app
          if [ ! -f android/app/release.keystore ]; then
            keytool -genkeypair -v -storetype JKS -keystore android/app/release.keystore -alias release -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=example, OU=example, O=example, L=example, S=example, C=US"
          fi

      - name: Build release APK(s)
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Find and Sign APKs
        run: |
          mkdir -p $GITHUB_WORKSPACE/artifacts
          find android/app/build/outputs/apk/release -type f -name "*.apk" -print -exec cp {} $GITHUB_WORKSPACE/artifacts/ \;
          ls -la $GITHUB_WORKSPACE/artifacts || true

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: artifacts/

      - name: Create GitHub Release
        id: create_release
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APKs to Release
        if: steps.create_release.outputs.upload_url != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPLOAD_URL: ${{ steps.create_release.outputs.upload_url }}
        run: |
          set -e
          for f in artifacts/*.apk; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            echo "Uploading $name to release"
            curl -sS -X POST -H "Authorization: token $GITHUB_TOKEN" -H "Content-Type: application/vnd.android.package-archive" --data-binary @"$f" "${UPLOAD_URL}?name=$name" || { echo "Upload failed for $name"; exit 1; }
          done
