name: Build signed Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build-android-apk:
    name: Build signed release APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      CI: true
      EXPO_NO_TELEMETRY: 1
      NODE_OPTIONS: --max_old_space_size=4096
      GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Prebuild Android project
        run: npx expo prebuild --platform android --clean --no-install

      - name: Remove removed Android Gradle options
        run: |
          sed -i '/android.useNewApkCreator/d' android/gradle.properties || true

      - name: Patch Gradle repository URL syntax
        run: |
          python3 - <<'PATCH'
          from pathlib import Path
          import re

          build_gradle = Path('android/build.gradle')
          text = build_gradle.read_text()

          text = re.sub(r'(?<![A-Za-z0-9_])url\s*\(', 'url = uri(', text)
          text = re.sub(r'(?<![A-Za-z0-9_])url\s+("[^"]+"|\'[^\']+\')', r'url = uri(\1)', text)

          build_gradle.write_text(text)
          PATCH

      - name: Generate debug keystore for release signing
        run: |
          mkdir -p android/app
          rm -f android/app/debug.keystore
          keytool -genkeypair \
            -v \
            -storetype JKS \
            -keystore android/app/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Ensure Gradle settings
        run: |
          chmod +x android/gradlew
          {
            echo "org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8"
            echo "android.useAndroidX=true"
            echo "android.enablePngCrunchInReleaseBuilds=true"
          } >> android/gradle.properties

      - name: Build signed release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace --warning-mode all

      - name: Collect APK artifact
        run: |
          mkdir -p artifacts
          APK_PATH=$(find android/app/build/outputs/apk/release -type f -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "Release APK was not found"
            exit 1
          fi
          cp "$APK_PATH" artifacts/sober-path-release-debug-signed.apk
          ls -lh artifacts/sober-path-release-debug-signed.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sober-path-release-debug-signed-apk
          path: artifacts/sober-path-release-debug-signed.apk
          if-no-files-found: error
          retention-days: 14
