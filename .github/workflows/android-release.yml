name: Android Release APKs

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  build-release-apks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies (allow legacy peer deps to avoid conflicts)
        run: npm ci --legacy-peer-deps

      - name: Install JDK 17 (must run before Android SDK setup)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Verify Java
        run: |
          echo "Java version:" && java -version || true
          echo "JAVA_HOME=$JAVA_HOME"

      - name: Set up Android SDK (install required packages)
        uses: android-actions/setup-android@v4
        with:
          cmdline-tools-version: '12.0'
          packages: |
            platform-tools
            platforms;android-33
            build-tools;33.0.2

      - name: Accept Android SDK licenses (with JDK-check fallback)
        run: |
          set -e
          echo "Attempting to accept SDK licenses..."
          if sdkmanager --licenses; then
            echo "Accepted SDK licenses"
          else
            echo "Initial sdkmanager --licenses failed; retrying with SKIP_JDK_VERSION_CHECK=true"
            SKIP_JDK_VERSION_CHECK=true sdkmanager --licenses || { echo "Accepting SDK licenses failed even with SKIP_JDK_VERSION_CHECK"; exit 1; }
          fi

      - name: Prebuild Android (Expo)
        run: npx expo prebuild -p android --no-install --no-interactive

      - name: Ensure android/gradlew is executable
        run: |
          if [ -f android/gradlew ]; then chmod +x android/gradlew; fi

      - name: Add ABI splits (armeabi-v7a, arm64-v8a) if file exists
        run: |
          file="android/app/build.gradle"
          if [ -f "$file" ]; then
            if grep -q "splits {" "$file"; then
              echo "splits already present"
            else
              # insert splits block before first occurrence of "buildTypes"
              awk 'BEGIN{p=1} /buildTypes\s*\{/ && p==1{print "    splits {\n        abi {\n            enable true\n            reset()\n            include '"'"'armeabi-v7a'"'"', '"'"'arm64-v8a'"'"'\n            universalApk false\n        }\n    }\n"; p=0} {print}' "$file" > "$file.tmp" && mv "$file.tmp" "$file"
            fi
          else
            echo "$file not found, skipping splits injection"
          fi

      - name: Generate test keystore
        run: |
          mkdir -p android/app
          keytool -genkeypair -v -storetype JKS -keystore android/app/release.keystore -alias release -keyalg RSA -keysize 2048 -validity 10000 -storepass android -keypass android -dname "CN=example, OU=example, O=example, L=example, S=example, C=US"

      - name: Build release APK(s)
        working-directory: android
        run: ./gradlew clean assembleRelease --no-daemon --no-parallel

      - name: Find APKs
        run: |
          mkdir -p $GITHUB_WORKSPACE/artifacts
          find android/app/build/outputs -type f -name "*.apk" -print -exec cp {} $GITHUB_WORKSPACE/artifacts/ \;
          ls -la $GITHUB_WORKSPACE/artifacts || true

      - name: Sign APKs with generated keystore
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/android/app/release.keystore
          KEYSTORE_PASS: android
          KEY_ALIAS: release
          KEY_PASS: android
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          set -e
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          build_tools_dir=$(ls -d "$ANDROID_SDK_ROOT/build-tools"/*/ | sort -V | tail -n1)
          echo "Using build-tools dir: $build_tools_dir"
          apksigner="$build_tools_dir/apksigner"
          if [ ! -x "$apksigner" ]; then echo "apksigner not found at $apksigner"; ls -la "$ANDROID_SDK_ROOT/build-tools" || true; exit 1; fi
          for apk in $GITHUB_WORKSPACE/artifacts/*.apk; do
            [ -f "$apk" ] || continue
            base=$(basename "$apk")
            unsigned="$apk"
            signed="$GITHUB_WORKSPACE/artifacts/signed-$base"
            echo "Signing $unsigned -> $signed"
            "$apksigner" sign --ks "$KEYSTORE_PATH" --ks-pass pass:$KEYSTORE_PASS --key-pass pass:$KEY_PASS --ks-key-alias $KEY_ALIAS --out "$signed" "$unsigned" || { echo "Signing failed for $apk"; exit 1; }
          done
          ls -la $GITHUB_WORKSPACE/artifacts

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: artifacts/
