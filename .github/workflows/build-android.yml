name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      architectures:
        description: 'Target architectures (comma-separated)'
        required: false
        default: 'arm64-v8a,armeabi-v7a,x86_64,x86'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [arm64-v8a, armeabi-v7a, x86_64, x86]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Generate native Android project
        run: npx expo prebuild --platform android --clean

      - name: Build APK for ${{ matrix.arch }}
        working-directory: android
        run: |
          ./gradlew assembleRelease \
            -PreactNativeArchitectures=${{ matrix.arch }} \
            -PreactNativeEnableHermes=true

      - name: Rename APK
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          mv "$APK_PATH" "Sober-Path-${VERSION}-${{ matrix.arch }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sober-Path-${{ matrix.arch }}
          path: Sober-Path-*.apk
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: Sober-Path-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.apk
          generate_release_notes: true
          draft: false
          prerelease: false
